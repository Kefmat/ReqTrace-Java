name: Java CI with Automated Testing

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Compile Project and Tests
      run: |
        mkdir -p bin
        javac -d bin Main.java src/model/*.java src/parser/*.java src/engine/*.java test/RequirementTest.java

    - name: Run Unit Tests
      run: |
        java -cp bin test.RequirementTest

    - name: Run Analysis Engine (Integration Test)
      run: |
        java -cp bin Main