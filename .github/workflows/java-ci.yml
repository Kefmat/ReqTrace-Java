name: Java CI with Automated Testing

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17' 
        distribution: 'temurin'
        
    - name: Compile Everything
      run: |
        mkdir -p bin
        find . -name "*.java" > sources.txt
        javac -d bin @sources.txt

    - name: Check Javadoc Generation
      run: |
        mkdir -p docs
        javadoc -d docs -sourcepath src -subpackages model:engine:parser src/Main.java

    - name: Run Unit Tests
      run: |
        java -cp bin test.RequirementTest

    - name: Run Main Application
      run: |
        mkdir -p data
        java -cp bin Main
    
    - name: Upload Analysis Reports
      uses: actions/upload-artifact@v4
      with:
        name: missile-analysis-reports
        path: |
          Traceability_Report.md
          analysis_output.json

    - name: Upload Javadoc
      uses: actions/upload-artifact@v4
      with:
        name: java-documentation
        path: docs/