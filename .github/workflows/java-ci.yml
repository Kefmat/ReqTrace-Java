name: Java CI with Automated Testing

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Compile Everything
      run: |
        mkdir -p bin
        # Vi søker fra rot (.) for å finne alle .java-filer uansett hvor de ligger
        find . -name "*.java" > sources.txt
        javac -d bin @sources.txt

    - name: Run Unit Tests
      run: |
        # Vi bruker fullt pakkenavn siden RequirementTest.java har 'package test;'
        java -cp bin test.RequirementTest

    - name: Run Main Application
      run: |
        mkdir -p data
        # Vi kjører Main (som ligger i rot uten pakke)
        java -cp bin Main