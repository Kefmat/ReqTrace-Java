name: Java CI with Automated Testing

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Compile Everything
      run: |
        mkdir -p bin
        # Finner alle kildekoder for kompilering
        find . -name "*.java" > sources.txt
        javac -d bin @sources.txt

    - name: Check Javadoc Generation
      run: |
        # Validerer at dokumentasjonen kan bygges uten feil
        mkdir -p docs
        javadoc -d docs -sourcepath src/model:src/engine:src/parser -subpackages model:engine:parser Main.java

    - name: Run Unit Tests
      run: |
        # Kjører tester med riktig klassesti
        java -cp bin test.RequirementTest

    - name: Run Main Application
      run: |
        mkdir -p data
        java -cp bin Main