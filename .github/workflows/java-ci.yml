name: Java CI with Automated Testing

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Compile Project and Tests
      run: |
        mkdir -p bin
        find . src test -name "*.java" > sources.txt
        javac -d bin @sources.txt

    - name: Run Unit Tests
      run: |
        java -cp bin RequirementTest

    - name: Run Analysis Engine
      run: |
        mkdir -p data
        java -cp bin Main